<div class="auth-page">
  <div class="auth-card">
    <div class="auth-tag">Forgot Password</div>
    <h2>Reset your<br><em>Tour Bangladesh</em> password</h2>
    <div class="alert alert-success" role="alert" *ngIf="successMsg">{{ successMsg }}</div>
    <div class="alert alert-danger" role="alert" *ngIf="errorMsg">{{ errorMsg }}</div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" id="email" type="email" formControlName="email" placeholder="your@email.com">
        <div class="form-error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">
          Enter a valid email.
        </div>
      </div>
      <button class="btn-primary" type="submit" style="width:100%; margin-top:8px;" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>
    <div class="auth-switch">
      <a routerLink="/auth/login">Back to Login</a>
    </div>
  </div>
</div>
