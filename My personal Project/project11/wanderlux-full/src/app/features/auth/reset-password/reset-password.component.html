<div class="auth-page">
  <div class="auth-card">
    <div class="auth-tag">Reset Password</div>
    <h2>Set a new password for<br><em>Tour Bangladesh</em></h2>

    <!-- Success and Error Messages -->
    <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>
    <div class="alert alert-danger" *ngIf="errorMsg">{{ errorMsg }}</div>

    <!-- Reset Password Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- New Password -->
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input class="form-input" type="password" formControlName="newPassword" placeholder="Enter new password">
        <div class="form-error" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.errors?.['required']">
          Password is required.
        </div>
        <div class="form-error" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.errors?.['minlength']">
          Password must be at least 6 characters.
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" formControlName="confirmPassword" placeholder="Confirm new password">
        <div class="form-error" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.errors?.['required']">
          Confirm your password.
        </div>
      </div>

      <!-- Submit Button -->
      <button class="btn-primary" style="width:100%; margin-top:8px;" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <!-- Back to Login -->
    <div class="auth-switch">
      <a routerLink="/auth/login">Back to Login</a>
    </div>
  </div>
</div>
