<div class="auth-page">
  <div class="auth-card">
    <div class="auth-tag">Join Us</div>
    <h2>Create Your<br><em>Account</em></h2>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" type="text" formControlName="fullName" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="tel" formControlName="phoneNumber" placeholder="+880...">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" formControlName="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" formControlName="password" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <select class="form-input" formControlName="role">
          <option value="Traveler">Traveler — I want to book tours</option>
          <option value="Agency">Travel Agency — I want to list tours</option>
        </select>
      </div>
      <button class="btn-primary" style="width:100%;margin-top:8px;justify-content:center" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Creating...' : 'Create Account →' }}
      </button>
    </form>
    <div class="auth-switch">Already have an account? <a routerLink="/auth/login">Sign in here</a></div>
  </div>
</div>
