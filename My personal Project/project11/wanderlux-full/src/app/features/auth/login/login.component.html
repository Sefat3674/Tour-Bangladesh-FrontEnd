<div class="auth-page">
  <div class="auth-card">
    <div class="auth-tag">Welcome Back</div>
    <h2>Sign In to<br><em>Tour Bangladesh</em></h2>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" formControlName="email" placeholder="your@email.com">
        <div class="form-error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">Enter a valid email.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" formControlName="password" placeholder="Enter password">
      </div>
      <button class="btn-primary" style="width:100%;margin-top:8px;justify-content:center" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In →' }}
      </button>
    </form>
    <div class="auth-switch">Don't have an account? <a routerLink="/auth/register">Register here</a></div>
    <div class="auth-switch">Forgot password? <a routerLink="/auth/forgotPassWord">Reset Password</a></div>
  </div>
  
</div>
